# Perfil de test: H2 en memoria, sin MySQL ni variables de entorno reales.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false

# Secretos ficticios solo para el contexto de test
jwt.secret=clave-de-test-suficientemente-larga-para-hs256-0123456789
jwt.expiration=3600000
supercell.token=token-de-test
