<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapas - BrawlLMB Analytics</title>

    <link rel="icon" href="/favicon_kenji.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a 40%, #202020);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        .bg-logo {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            transform: translate(-50%, -50%);
            opacity: 0.05;
            background: url('images/logo_lmb.png') center/contain no-repeat;
            pointer-events: none;
            z-index: 0;
        }

        header {
            background: rgba(20,20,20,0.85);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            z-index: 2;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box img {
            width: 42px;
            height: 42px;
        }

        .logo-box h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #ddd;
            font-weight: 500;
            transition: .3s;
        }

        nav a:hover {
            color: #4da3ff;
        }

        main.mapas-layout {
            flex: 1;
            padding: 40px;
            display: grid;
            grid-template-columns: 45% 55%;
            gap: 50px;
            max-width: 1500px;
            margin: auto;
            z-index: 1;
        }

        .col-izq {
            height: fit-content;
            align-self: start;
            min-width: 420px;
        }

        .grid-rotacion {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            justify-items: center;
        }

        .col-der {
            padding-left: 60px;
            margin-left: 20px;
            border-left: 3px solid rgba(255,255,255,0.15);
        }

        .modo-bloque {
            margin-bottom: 50px;
        }

        .modo-titulo {
            margin: 10px 0;
            font-size: 22px;
            font-weight: 600;
            color: #4da3ff;
        }

        .carrusel-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .carrusel-mapas {
            display: flex;
            flex-wrap: nowrap;
            gap: 14px;
            padding: 12px 0;
            overflow-x: auto;
            overflow-y: hidden;
            scroll-behavior: smooth;
            max-width: 100%;
        }

        .carrusel-mapas::-webkit-scrollbar {
            display: none;
        }

        .carrusel-mapas > * {
            flex: 0 0 auto !important;
        }

        .carrusel-btn {
            background: rgba(0,0,0,0.6);
            border: none;
            color: #fff;
            width: 32px;
            height: 80px;
            border-radius: 999px;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: .2s;
        }

        .carrusel-btn:hover {
            background: rgba(255,255,255,0.15);
            transform: scale(1.05);
        }

        .mapa-card {
            width: 160px;
            height: 220px;
            perspective: 1000px;
            cursor: pointer;
            flex-shrink: 0;
        }

        .mapa-card-inner {
            width: 100%;
            height: 100%;
            transition: transform .6s;
            transform-style: preserve-3d;
            position: relative;
        }

        .mapa-card.flip .mapa-card-inner {
            transform: rotateY(180deg);
        }

        .mapa-card-front,
        .mapa-card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            padding: 10px;
        }

        .mapa-card-front {
            background: rgba(255,255,255,0.07);
            text-align: center;
        }

        .mapa-card-back {
            background: rgba(0,0,0,0.45);
            transform: rotateY(180deg);
            padding: 14px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: left;
            font-size: 13px;
        }

        .mapa-img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            background: #111;
            padding: 4px;
            border-radius: 10px;
        }

        .bloque-top-brawlers {
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 16px;
            margin-top: 30px;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            display: none;
        }
    </style>
</head>

<body>

<div class="bg-logo"></div>

<header>
    <div class="logo-box">
        <img src="images/logo_lmb.png" alt="logo">
        <h1>BrawlLMB Analytics</h1>
    </div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="cuenta.html">Mi Cuenta Brawl</a>
        <a href="estadisticas.html">Estadísticas</a>
        <a href="mapas.html">Mapas</a>
        <a href="tierlist.html">Tierlist</a>
        <a href="cuentas.html">Cuentas vinculadas</a>
        <a href="#" onclick="logout()">Cerrar Sesión</a>
    </nav>
</header>

<main class="mapas-layout">

    <section class="col-izq">
        <h2>Mapas en rotación</h2>
        <p>Mira los mapas que están actualmente activos.</p>
        <div id="mapasRotacionContainer" class="grid-rotacion"></div>
    </section>

    <section class="col-der">
        <h2>Mapas por modo</h2>
        <div id="mapasPorModo"></div>
    </section>

</main>

<section id="bloqueTopBrawlers" class="bloque-top-brawlers">
    <h2 id="tituloTopBrawlers">Mejores Brawlers</h2>
    <div id="topBrawlersContainer"></div>
</section>

<script src="js/auth.js"></script>

</body>
</html>
