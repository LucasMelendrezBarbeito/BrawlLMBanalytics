<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Cuenta Brawl - BrawlLMB Analytics</title>

    <link rel="icon" href="/favicon_kenji.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a 40%, #202020);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        .bg-logo {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 650px;
            height: 650px;
            transform: translate(-50%, -50%);
            opacity: 0.05;
            background: url('images/logo_lmb.png') center/contain no-repeat;
            pointer-events: none;
            z-index: 0;
        }

        header {
            background: rgba(20,20,20,0.85);
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(6px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 2px 12px rgba(0,0,0,0.4);
            z-index: 2;
        }

        .logo-box {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box img {
            width: 42px;
            height: 42px;
        }

        .logo-box h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 700;
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #ddd;
            font-weight: 500;
            transition: .3s;
        }

        nav a:hover {
            color: #4da3ff;
        }

        main {
            flex: 1;
            padding: 50px 20px;
            text-align: center;
            position: relative;
            z-index: 2;
            max-width: 900px;
            margin: auto;
        }

        main h2 {
            font-size: 34px;
            margin-bottom: 25px;
        }

        .buscador-cuenta {
            background: rgba(255,255,255,0.06);
            padding: 35px;
            margin-bottom: 40px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(12px);
            text-align: center;
        }

        .buscador-cuenta h3 {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .tag-buscador {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 10px;
        }

        .tag-buscador input {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            outline: none;
            width: 230px;
            font-size: 16px;
        }

        .tag-buscador button {
            background: #4da3ff;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: .25s;
        }

        .tag-buscador button:hover {
            background: #1f8aff;
            transform: translateY(-2px);
        }

        .ayuda-tag {
            font-size: 14px;
            opacity: .75;
            margin-bottom: 20px;
        }

        .resultado-cuenta {
            margin-top: 20px;
            font-size: 16px;
        }

        .panel-secundario {
            background: rgba(255,255,255,0.06);
            padding: 30px;
            border-radius: 16px;
            backdrop-filter: blur(12px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
        }

        .panel-secundario h3 {
            font-size: 22px;
            margin-bottom: 10px;
        }

        .panel-card {
            display: inline-block;
            margin-top: 15px;
            background: rgba(255,255,255,0.08);
            padding: 18px 28px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            transition: 0.25s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.25);
        }

        .panel-card:hover {
            background: rgba(255,255,255,0.14);
            transform: translateY(-4px);
        }
        .btn-vincular {
    margin-top: 20px;
    display: inline-block;
    background: #4da3ff;
    color: #fff;
    border: none;
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 600;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 14px rgba(77,163,255,0.35);
    transition: 0.25s ease;
}

.btn-vincular:hover {
    background: #1f8aff;
    box-shadow: 0 6px 20px rgba(77,163,255,0.55);
    transform: translateY(-2px);
}

    </style>

</head>
<body>

<div class="bg-logo"></div>

<header>
    <div class="logo-box">
        <img src="images/logo_lmb.png" alt="logo">
        <h1>BrawlLMB Analytics</h1>
    </div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="cuenta.html">Mi Cuenta Brawl</a>
        <a href="estadisticas.html">Estadísticas</a>
        <a href="mapas.html">Mapas</a>
        <a href="tierlist.html">Tierlist</a>
        <a href="#" onclick="logout()">Cerrar Sesión</a>
    </nav>
</header>

<main>

    <h2>Mi Cuenta de Brawl Stars</h2>

    <section class="buscador-cuenta">
        <h3>Vincular nueva cuenta</h3>

        <form id="tagForm" class="tag-buscador" action="javascript:void(0);">
            <input type="text" id="tagInput" placeholder="Ingresar etiqueta" required>
            <button type="submit">Buscar</button>
        </form>

        <p class="ayuda-tag">Ejemplo de etiqueta: #ABCD123</p>

        <div id="resultadoCuenta" class="resultado-cuenta"></div>
    </section>

    <section class="panel-secundario">
        <h3>Mis cuentas vinculadas</h3>
        <p>Pulsa aquí para ver todas tus cuentas vinculadas.</p>

        <a class="panel-card" href="cuentas.html">Ver cuentas vinculadas</a>
    </section>

</main>

<script src="js/auth.js"></script>
</body>
</html>
