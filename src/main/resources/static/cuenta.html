<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Cuenta &mdash; BrawlLMB Analytics</title>
    <link rel="icon" href="/favicon_kenji.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/main.css">

<body>

<div class="bg-grid"></div>

<header>
    <a class="logo-box" href="dashboard.html">
        <img src="images/logo.svg" alt="BrawlLMB">
        <h1>BrawlLMB</h1>
    </a>
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Menu">&#9776;</button>
    <nav id="mainNav">
        <a href="cuenta.html" class="activo">Mi Cuenta</a>

<main>
    <div class="page-header">
        <h2 class="section-title">Mi Cuenta de Brawl Stars</h2>
    </div>

    <div class="glass-static" style="padding:2rem; max-width:600px; margin:0 auto 2rem;">
        <h3 class="text-center mb-2" style="font-size:1.15rem;">Vincular nueva cuenta</h3>

        <form id="tagForm" class="search-bar" action="javascript:void(0);">
            <input type="text" id="tagInput" placeholder="Ej: #ABCD123" required>
            <button type="submit">Buscar</button>
        </form>

        <p class="text-center mt-1" style="font-size:0.78rem; color:var(--text-dim);">Ingresa tu tag de Brawl Stars con #</p>

        <div id="resultadoCuenta" class="mt-3"></div>
    </div>

    <div class="glass-static text-center" style="padding:2rem; max-width:600px; margin:0 auto;">
        <h3 class="mb-2" style="font-size:1.15rem;">Mis cuentas vinculadas</h3>
        <p style="font-size:0.85rem; color:var(--text-muted); margin-bottom:1.5rem;">Pulsa aqu&iacute; para ver todas tus cuentas vinculadas.</p>
        <a class="btn btn-ghost" href="cuentas.html">Ver cuentas vinculadas</a>
    </div>
