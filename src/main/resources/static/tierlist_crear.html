<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Tierlist &mdash; BrawlLMB Analytics</title>
    <link rel="icon" href="/favicon_kenji.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="bg-grid"></div>

<header>
    <a class="logo-box" href="dashboard.html">
        <img src="images/logo.svg" alt="BrawlLMB">
        <h1>BrawlLMB</h1>
    </a>
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Menu">&#9776;</button>
    <nav id="mainNav">
        <a href="cuenta.html">Mi Cuenta</a>
        <a href="estadisticas.html">Estad&iacute;sticas</a>
        <a href="mapas.html">Mapas</a>
        <a href="tierlist.html" class="activo">Tierlists</a>
        <a href="#" onclick="event.preventDefault(); logout();">Salir</a>
    </nav>
</header>

<main>
    <div class="page-header">
        <h2 class="section-title">Crear Tierlist</h2>
        <p class="section-subtitle">Arrastra los brawlers a cada tier.</p>
    </div>

    <h3 style="color:var(--text-muted); font-size:0.9rem; margin-bottom:0.75rem; text-transform:uppercase; letter-spacing:1px;">Brawlers disponibles</h3>
    <div id="brawlers-container" class="glass-static brawler-pool"></div>

    <h3 style="color:var(--text-muted); font-size:0.9rem; margin:2rem 0 0.75rem; text-transform:uppercase; letter-spacing:1px;">Ordena por niveles</h3>

    <div class="tier-section">
        <div class="tier-row glass-static">
            <div class="tier-badge tier-S">S</div>
            <div class="tier-dropzone" data-tier="S"></div>
        </div>
        <div class="tier-row glass-static">
            <div class="tier-badge tier-A">A</div>
            <div class="tier-dropzone" data-tier="A"></div>
        </div>
        <div class="tier-row glass-static">
            <div class="tier-badge tier-B">B</div>
            <div class="tier-dropzone" data-tier="B"></div>
        </div>
        <div class="tier-row glass-static">
            <div class="tier-badge tier-C">C</div>
            <div class="tier-dropzone" data-tier="C"></div>
        </div>
        <div class="tier-row glass-static">
            <div class="tier-badge tier-D">D</div>
            <div class="tier-dropzone" data-tier="D"></div>
        </div>
    </div>

    <div class="text-center mt-4">
        <button class="btn" onclick="guardarTierlist()">Guardar Tierlist</button>
    </div>
</main>

<footer>
    &copy; 2025 BrawlLMB Analytics &mdash; Todos los derechos reservados.
</footer>

<script>
const API_BASE = "";
let listaBrawlers = [];

function toggleMenu() {
    document.getElementById('mainNav').classList.toggle('open');
}

async function logout() {
    try { await fetch(`${API_BASE}/auth/logout`, { method: "POST", credentials: 'include' }); }
    catch (e) { console.error("Error during logout:", e); }
    localStorage.clear();
    window.location.href = "login.html";
}

async function cargarBrawlers() {
    const res = await fetch(`${API_BASE}/brawl/brawlers`);
    listaBrawlers = await res.json();

    const cont = document.getElementById("brawlers-container");
    cont.innerHTML = "";

    listaBrawlers.forEach(b => {
        const img = document.createElement("img");
        img.src = b.iconUrl;
        img.className = "brawler-chip";
        img.draggable = true;
        img.dataset.id = b.id;
        img.title = b.nombre;
        img.addEventListener("dragstart", dragStart);
        cont.appendChild(img);
    });
}

function dragStart(e) {
    e.dataTransfer.setData("id", e.target.dataset.id);
}

document.querySelectorAll(".tier-dropzone").forEach(zone => {
    zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("drag-over"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("drag-over"));
    zone.addEventListener("drop", e => {
        e.preventDefault();
        zone.classList.remove("drag-over");
        const id = e.dataTransfer.getData("id");
        moverBrawler(id, zone);
    });
});

const pool = document.getElementById("brawlers-container");
pool.addEventListener("dragover", e => e.preventDefault());
pool.addEventListener("drop", e => {
    e.preventDefault();
    const id = e.dataTransfer.getData("id");
    moverBrawler(id, pool);
});

function moverBrawler(id, destino) {
    document.querySelectorAll(`[data-id='${id}']`).forEach(el => el.remove());
    const b = listaBrawlers.find(x => x.id == id);
    const img = document.createElement("img");
    img.src = b.iconUrl;
    img.className = "brawler-chip";
    img.draggable = true;
    img.dataset.id = id;
    img.title = b.nombre;
    img.addEventListener("dragstart", dragStart);
    destino.appendChild(img);
}

async function guardarTierlist() {
    const nombre = prompt("Nombre de la tierlist:");
    if (!nombre) return alert("Debes poner un nombre.");

    const token = localStorage.getItem("token");
    let items = [];

    document.querySelectorAll(".tier-dropzone").forEach(zone => {
        const tier = zone.dataset.tier;
        zone.querySelectorAll(".brawler-chip").forEach(img => {
            items.push({ brawlerId: parseInt(img.dataset.id), tier: tier });
        });
    });

    const res = await fetch(`${API_BASE}/tierlists/crear?nombre=${encodeURIComponent(nombre)}`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}` }
    });

    const nueva = await res.json();

    for (let it of items) {
        await fetch(`${API_BASE}/tierlists/${nueva.id}/agregar-item`, {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
            body: JSON.stringify(it)
        });
    }

    alert("Tierlist creada correctamente");
    window.location.href = `tierlist_ver.html?id=${nueva.id}`;
}

cargarBrawlers();
</script>
</body>
</html>
