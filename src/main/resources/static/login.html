<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login &mdash; BrawlLMB Analytics</title>
    <link rel="icon" href="/favicon_kenji.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="bg-grid"></div>

<header>
    <a class="logo-box" href="index.html">
        <img src="images/logo.svg" alt="BrawlLMB">
        <h1>BrawlLMB</h1>
    </a>
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Menu">&#9776;</button>
    <nav id="mainNav">
        <a href="index.html">Inicio</a>
        <a href="login.html" class="activo">Login</a>
        <a href="register.html">Registro</a>
    </nav>
</header>

<main style="display:flex; justify-content:center; align-items:center; min-height:calc(100vh - 64px - 60px);">
    <div class="glass-static" style="padding:2.5rem; width:100%; max-width:420px;">
        <h2 class="text-center mb-3" style="font-size:1.5rem;">Iniciar Sesi&oacute;n</h2>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Usuario</label>
                <input type="text" id="username" class="form-input" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Contrase&ntilde;a</label>
                <input type="password" id="password" class="form-input" required autocomplete="current-password">
            </div>

            <button type="submit" class="btn w-full mt-3">Entrar</button>
        </form>

        <p class="text-center mt-3" style="font-size:0.82rem; color:var(--text-muted);">
            &iquest;No tienes cuenta? <a href="register.html" style="color:var(--accent-light); text-decoration:none;">Reg&iacute;strate</a>
        </p>
    </div>
</main>

<footer>
    &copy; 2025 BrawlLMB Analytics &mdash; Todos los derechos reservados.
</footer>

<script src="js/auth.js"></script>
<script>
function toggleMenu() {
    document.getElementById('mainNav').classList.toggle('open');
}
</script>
</body>
</html>
