<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ver Tierlist &mdash; BrawlLMB Analytics</title>
    <link rel="icon" href="/favicon_kenji.ico" type="image/x-icon">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>

<div class="bg-grid"></div>

<header>
    <a class="logo-box" href="dashboard.html">
        <img src="images/logo.svg" alt="BrawlLMB">
        <h1>BrawlLMB</h1>
    </a>
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Menu">&#9776;</button>
    <nav id="mainNav">
        <a href="cuenta.html">Mi Cuenta</a>
        <a href="estadisticas.html">Estad&iacute;sticas</a>
        <a href="mapas.html">Mapas</a>
        <a href="tierlist.html" class="activo">Tierlists</a>
        <a href="#" onclick="event.preventDefault(); logout();">Salir</a>
    </nav>
</header>

<main>
    <div class="page-header">
        <h2 id="tituloTierlist" class="section-title"></h2>
    </div>

    <h3 style="color:var(--text-muted); font-size:0.9rem; margin-bottom:1rem; text-transform:uppercase; letter-spacing:1px;">Brawlers del Tierlist</h3>

    <div class="tier-section">
        <div class="tier-row glass-static">
            <div class="tier-badge tier-S">S</div>
            <div id="tier-S" class="tier-dropzone-view"></div>
        </div>
        <div class="tier-row glass-static">
            <div class="tier-badge tier-A">A</div>
            <div id="tier-A" class="tier-dropzone-view"></div>
        </div>
        <div class="tier-row glass-static">
            <div class="tier-badge tier-B">B</div>
            <div id="tier-B" class="tier-dropzone-view"></div>
        </div>
        <div class="tier-row glass-static">
            <div class="tier-badge tier-C">C</div>
            <div id="tier-C" class="tier-dropzone-view"></div>
        </div>
        <div class="tier-row glass-static">
            <div class="tier-badge tier-D">D</div>
            <div id="tier-D" class="tier-dropzone-view"></div>
        </div>
    </div>

    <div class="divider"></div>

    <div class="glass-static" style="padding:2rem; max-width:700px; margin:0 auto;">
        <h3 style="margin-bottom:1rem;">Dejar una rese&ntilde;a</h3>
        <p style="font-size:0.82rem; color:var(--text-muted); margin-bottom:1rem;">Punt&uacute;a esta tierlist</p>

        <div id="rating" class="rating-selector">
            <span class="rating-pip" data-value="1">1</span>
            <span class="rating-pip" data-value="2">2</span>
            <span class="rating-pip" data-value="3">3</span>
            <span class="rating-pip" data-value="4">4</span>
            <span class="rating-pip" data-value="5">5</span>
        </div>

        <textarea id="comentario" class="form-input mt-2" rows="3" placeholder="Escribe tu comentario..." style="resize:vertical;"></textarea>
        <button class="btn mt-2" onclick="enviarReview()">Enviar rese&ntilde;a</button>
    </div>

    <div class="divider"></div>

    <h3 style="margin-bottom:1rem;">Rese&ntilde;as</h3>
    <div id="reviewsContainer"></div>
</main>

<footer>
    &copy; 2025 BrawlLMB Analytics &mdash; Todos los derechos reservados.
</footer>

<script>
document.addEventListener("DOMContentLoaded", () => {
    cargarTierlist();
    inicializarRating();
});

const API_BASE = "";
let puntuacionSeleccionada = 0;

function toggleMenu() {
    document.getElementById('mainNav').classList.toggle('open');
}

function inicializarRating() {
    const pips = document.querySelectorAll(".rating-pip");
    pips.forEach(pip => {
        pip.addEventListener("mouseover", () => resaltarPips(pip.dataset.value));
        pip.addEventListener("click", () => {
            puntuacionSeleccionada = parseInt(pip.dataset.value);
            resaltarPips(puntuacionSeleccionada);
        });
    });
    document.getElementById("rating").addEventListener("mouseleave", () => resaltarPips(puntuacionSeleccionada));
}

function resaltarPips(num) {
    document.querySelectorAll(".rating-pip").forEach(pip => {
        pip.classList.toggle("active", parseInt(pip.dataset.value) <= num);
    });
}

async function cargarTierlist() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const res = await fetch(`${API_BASE}/tierlists/${id}`);
    const t = await res.json();

    document.getElementById("tituloTierlist").textContent = t.nombre;

    ["S","A","B","C","D"].forEach(tier => {
        document.getElementById(`tier-${tier}`).innerHTML = "";
    });

    if (t.items?.length) {
        t.items.forEach(it => {
            const img = document.createElement("img");
            img.src = `https://cdn.brawlify.com/brawlers/borderless/${it.brawler.id}.png`;
            img.className = "brawler-icon";
            img.title = it.brawler.nombre;
            document.getElementById(`tier-${it.tier}`).appendChild(img);
        });
    }

    cargarResenas(t);
}

function escapeHtml(str) {
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

function cargarResenas(t) {
    const cont = document.getElementById("reviewsContainer");
    cont.innerHTML = "";

    if (t.reviews?.length) {
        t.reviews.forEach(r => {
            const p = Math.max(0, Math.min(5, parseInt(r.puntuacion) || 0));
            let pips = "";
            for (let i = 1; i <= 5; i++) {
                pips += `<span class="pip${i <= p ? ' filled' : ''}"></span>`;
            }
            const usuario = escapeHtml(r.usuario?.username ?? "Usuario");
            const comentario = escapeHtml(r.comentario ?? "");
            cont.innerHTML += `
                <div class="review-card glass-static">
                    <div class="review-header">
                        <span class="review-user">${usuario}</span>
                        <div class="review-score">${pips}</div>
                    </div>
                    <div class="review-comment">${comentario}</div>
                </div>`;
        });
    } else {
        cont.innerHTML = '<div class="empty-state"><p>No hay rese&ntilde;as a&uacute;n.</p></div>';
    }
}

async function enviarReview() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const comentario = document.getElementById("comentario").value.trim();
    const token = localStorage.getItem("token");

    if (!token) return alert("Debes iniciar sesi&oacute;n.");
    if (!comentario) return alert("Escribe un comentario.");
    if (puntuacionSeleccionada == 0) return alert("Selecciona una puntuaci&oacute;n.");

    const url = `${API_BASE}/tierlists/${id}/review?comentario=${encodeURIComponent(comentario)}&puntuacion=${puntuacionSeleccionada}`;
    const resp = await fetch(url, { method: "POST", headers: { "Authorization": `Bearer ${token}` } });

    if (!resp.ok) {
        alert(resp.status === 401 || resp.status === 403 ? "Debes iniciar sesi&oacute;n." : "No se pudo enviar la rese&ntilde;a.");
        return;
    }

    alert("Rese&ntilde;a enviada");
    document.getElementById("comentario").value = "";
    puntuacionSeleccionada = 0;
    resaltarPips(0);
    cargarTierlist();
}
</script>
</body>
</html>
