# Perfil de desarrollo: logs verbosos.
# Activar con la variable de entorno SPRING_PROFILES_ACTIVE=dev
# o al arrancar: mvnw spring-boot:run -Dspring-boot.run.profiles=dev
#
# En produccion NO se activa este perfil, asi que no se emiten ni las
# consultas SQL ni los logs DEBUG de seguridad.

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
